<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal Engineer Learning Path</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#633806;
  --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#712B13;
  --green:#3B6D11;--green-light:#EAF3DE;--green-dark:#27500A;
  --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --border:#E2E0D8;--border-em:#C8C5BC;
  --ink:#1a1a18;--muted:#5a5a56;--faint:#9b9b96;
  --surface:#ffffff;--raised:#f7f6f2;--bg:#f0efe9;
  --r:14px;--rm:9px;
}
@media(prefers-color-scheme:dark){
  :root{
    --border:#2e2e2b;--border-em:#3e3e3b;
    --ink:#e8e6df;--muted:#9b9b96;--faint:#5f5e5a;
    --surface:#1e1e1c;--raised:#252523;--bg:#141412;
    --purple-light:#26215C;--teal-light:#04342C;--amber-light:#412402;
    --coral-light:#4A1B0C;--green-light:#173404;--blue-light:#042C53;
    --purple-dark:#CECBF6;--teal-dark:#9FE1CB;--amber-dark:#FAC775;
    --coral-dark:#F5C4B3;--green-dark:#C0DD97;--blue-dark:#B5D4F4;
  }
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.7;font-size:17px;min-height:100vh}
.page{max-width:1120px;margin:0 auto;padding:2.5rem 2.5rem 5rem}
.hero{padding:3rem 0 2rem;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--purple);background:var(--purple-light);padding:5px 16px;border-radius:99px;margin-bottom:1.1rem}
.hero h1{font-size:38px;font-weight:700;line-height:1.2;margin-bottom:.7rem;color:var(--ink)}
.hero p{font-size:17px;color:var(--muted);max-width:580px;margin:0 auto 2rem;line-height:1.75}
.prog-wrap{background:var(--raised);border-radius:99px;height:7px;overflow:hidden;border:.5px solid var(--border);margin-bottom:.4rem}
.prog-fill{height:100%;background:var(--purple);border-radius:99px;transition:width .5s ease;width:0%}
.prog-label{font-size:13px;color:var(--faint);text-align:right;margin-bottom:2rem}
.weeks{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:2rem}
.week-dot{height:54px;border-radius:var(--rm);background:var(--surface);border:.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.week-dot span{font-size:18px;font-weight:700;display:block;color:var(--ink)}
.week-dot label{font-size:10px;display:block;color:var(--faint);cursor:pointer;margin-top:2px}
.week-dot.done{background:var(--purple-light);border-color:var(--purple)}
.week-dot.done span,.week-dot.done label{color:var(--purple-dark)}
.week-dot.active{background:var(--purple);border-color:var(--purple)}
.week-dot.active span,.week-dot.active label{color:#fff}
.mod-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:2.5rem}
.mod-pill{font-size:13px;padding:7px 16px;border-radius:99px;border:.5px solid var(--border-em);cursor:pointer;transition:all .2s;color:var(--muted);background:var(--surface);font-family:inherit}
.mod-pill:hover{background:var(--raised);color:var(--ink)}
.mod-pill.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.section{display:none}.section.visible{display:block}
.mod-grid{display:grid;grid-template-columns:1fr 360px;gap:2.5rem;align-items:start;margin-top:1.5rem}
.mod-main{min-width:0}
.mod-sidebar{min-width:0;display:flex;flex-direction:column;gap:1.25rem}
.hook{border-radius:var(--r);padding:1.75rem 2rem;margin-bottom:0;border-left:4px solid var(--purple)}
.hook-q{font-size:21px;font-weight:700;line-height:1.35;margin-bottom:.6rem}
.hook-sub{font-size:15px;line-height:1.75;opacity:.8}
.anchor{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.5rem;display:flex;gap:1.25rem;align-items:flex-start;margin-bottom:1.75rem}
.anchor-vis{width:80px;height:80px;border-radius:var(--rm);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.anchor-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.anchor-name{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
.anchor-metaphor{font-size:14px;color:var(--muted);font-style:italic;line-height:1.65}
.story-bubble{background:var(--raised);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:10px;border-left:4px solid var(--purple)}
.story-who{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:5px}
.story-text{font-size:15px;color:var(--ink);line-height:1.8}
.model-card{border-radius:var(--r);padding:1.6rem 1.75rem;margin-bottom:1.75rem;position:relative;overflow:hidden}
.model-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.5rem}
.model-text{font-size:17px;font-weight:600;color:#fff;line-height:1.65;max-width:88%}
.model-emoji{position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:48px;opacity:.4}
.aha{border-radius:var(--rm);padding:1.1rem 1.4rem;display:flex;gap:12px;align-items:flex-start}
.aha-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.aha-title{font-size:14px;font-weight:700;margin-bottom:3px}
.aha-body{font-size:13px;line-height:1.65;opacity:.85}
.kmap{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem}
.kmap-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:.85rem}
.kmap-inner{display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.kmap-node{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.kmap-arrow{font-size:14px;color:var(--faint)}
.recall-card{border:.5px solid var(--border-em);border-radius:var(--r);overflow:hidden;margin-bottom:1.75rem}
.recall-q{padding:1.35rem 1.5rem;background:var(--raised)}
.recall-q-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:.5rem}
.recall-q-text{font-size:17px;font-weight:600;color:var(--ink);line-height:1.55}
.recall-a{padding:1.35rem 1.5rem;background:var(--surface);border-top:.5px solid var(--border);display:none}
.recall-a.shown{display:block}
.recall-a-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem}
.recall-a-text{font-size:15px;color:var(--ink);line-height:1.75}
.recall-btn{display:block;width:100%;padding:1rem;background:transparent;border:none;border-top:.5px solid var(--border);font-size:15px;color:var(--purple);cursor:pointer;text-align:center;font-weight:600;font-family:inherit}
.recall-btn:hover{background:var(--raised)}
.palace{background:var(--raised);border-radius:var(--r);padding:1.2rem 1.25rem}
.palace-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:1rem}
.palace-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.palace-room{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rm);padding:.85rem .65rem;text-align:center;cursor:pointer;transition:all .15s}
.palace-room:hover{border-color:var(--purple);background:var(--purple-light)}
.room-icon{font-size:22px;margin-bottom:5px}
.room-name{font-size:11px;font-weight:700;color:var(--ink)}
.room-concept{font-size:10px;color:var(--muted);margin-top:2px}
.feynman{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.35rem 1.5rem;margin-bottom:1.75rem}
.feynman-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:.5rem}
.feynman-prompt{font-size:15px;color:var(--muted);margin-bottom:.9rem;line-height:1.7}
.feynman textarea{width:100%;border:.5px solid var(--border-em);border-radius:var(--rm);padding:1rem;font-size:15px;color:var(--ink);background:var(--raised);resize:vertical;min-height:90px;font-family:inherit;outline:none}
.feynman textarea:focus{border-color:var(--purple)}
.feynman-btn{margin-top:.6rem;padding:8px 20px;font-size:14px;border:.5px solid var(--border-em);border-radius:var(--rm);cursor:pointer;background:var(--surface);color:var(--ink);font-family:inherit}
.feynman-btn:hover{background:var(--raised)}
.feynman-feedback{margin-top:.9rem;padding:.9rem 1.1rem;border-radius:var(--rm);font-size:14px;line-height:1.7;display:none}
.feynman-feedback.shown{display:block}
.company-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 12px;border-radius:99px;background:var(--raised);border:.5px solid var(--border);color:var(--muted);margin:0 5px 6px 0}
.companies{margin-bottom:.5rem}
.flashcard-wrap{perspective:800px;margin-bottom:.75rem;cursor:pointer;height:120px}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s}
.flashcard-wrap.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border:.5px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1.1rem;text-align:center}
.flashcard-front{background:var(--surface)}
.flashcard-back{transform:rotateY(180deg)}
.card-side{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:.5rem}
.card-text{font-size:14px;font-weight:600;color:var(--ink);line-height:1.5}
.sec-hdr{display:flex;align-items:center;gap:9px;margin:1.75rem 0 1rem}
.sec-hdr-icon{width:28px;height:28px;border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-hdr-title{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.bottom-nav{display:flex;justify-content:space-between;align-items:center;padding-top:1.75rem;border-top:.5px solid var(--border);margin-top:2rem;gap:10px}
.nav-btn{padding:10px 24px;border-radius:var(--rm);border:.5px solid var(--border-em);font-size:15px;cursor:pointer;background:var(--surface);color:var(--ink);display:flex;align-items:center;gap:7px;font-family:inherit;font-weight:600}
.nav-btn:hover{background:var(--raised)}
.nav-btn.primary{color:#fff;border-color:transparent}
.nav-btn.primary:hover{opacity:.88}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-btn.done-btn{border-color:transparent}
@media(max-width:960px){
  .mod-grid{grid-template-columns:1fr}
  .mod-sidebar{order:2}
  .page{padding:2rem 1.75rem 4rem}
}
@media(max-width:640px){
  body{font-size:16px}
  .page{padding:1.25rem 1.1rem 3.5rem}
  .hero h1{font-size:27px}
  .hero p{font-size:15px}
  .hook-q{font-size:18px}
  .weeks{grid-template-columns:repeat(4,1fr)}
  .mod-pill{font-size:12px;padding:5px 12px}
  .model-text{font-size:15px}
  .recall-q-text{font-size:15px}
  .palace-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:400px){
  .hero h1{font-size:23px}
  .weeks{grid-template-columns:repeat(4,1fr)}
  .week-dot{height:46px}
}
</style>
</head>
<body>
<div class="page">

<div class="hero">
  <div class="hero-badge"><i class="ti ti-brain" aria-hidden="true"></i> Principal Engineer · 8-Week Path</div>
  <h1>Learn to lead.<br>Built to remember.</h1>
  <p>Every module is engineered for retention — not just reading. Active recall, memory anchors, stories, and spaced repetition flashcards built in.</p>
</div>

<div class="prog-wrap"><div class="prog-fill" id="mainProg"></div></div>
<div class="prog-label" id="progLabel">0 of 6 modules started</div>

<div class="weeks" id="weekDots"></div>
<div class="mod-nav" id="modNav"></div>
<div id="sections"></div>

</div>

<script>
const MODULES=[{id:"m1",color:"#534AB7",bg:"#EEEDFE",dark:"#3C3489",cardBg:"#E6F1FB",num:"01",title:"Technical Strategy & Vision",emoji:"🗺️",metaphor:"The lighthouse keeper who decides where the beam points — not who operates the boats.",hook:"Why do some engineers get quoted in planning docs for years after they leave — while others build great systems nobody remembers?",hookSub:"Because strategy outlasts code. Staff engineers who shape direction create leverage that compounds. This module teaches you to be the person who sets the coordinates, not just navigates them.",story:[{who:"🏗️ Architect Alex",text:"Alex's team was debating whether to rebuild the auth service for the 3rd time. Instead of joining the debate, she wrote a 1-page vision. She pre-briefed the two loudest skeptics before the meeting. The discussion took 12 minutes. The decision stuck for 2 years."},{who:"📡 Vision Vera",text:"Vera built her org's first tech radar — nobody asked her to. She presented it to her director as 'the team's shared stance on technical risk.' Her director shared it with the VP. Vera was invited to the platform strategy meeting the following month."}],model:"A technical vision answers in one page: where are we, why is it not enough, and what does great look like in 18 months?",tactics:[{icon:"⚓",name:"Anchor early, adjust later",desc:"Publish a rough draft before it's polished. Your v0.1 shapes v1.0 more than any later revision."},{icon:"🤫",name:"Pre-brief key skeptics",desc:"Turn opponents into allies before the group meeting. The meeting ratifies; 1:1s decide."},{icon:"⚖️",name:"Make inaction a visible choice",desc:"Name 'do nothing' as Option C with its costs. Inertia looks safe until you price it."},{icon:"🗂️",name:"ADRs for reluctant teams",desc:"Architecture Decision Records capture why, not just what. Future-you will thank present-you."}],recall:{q:"What is the one-page test for a technical vision?",a:"If you can't explain where the system is today, why it falls short, and what great looks like in 18 months — on one page — the vision isn't clear yet. Clarity of document follows clarity of thought."},palace:[{icon:"🚪",name:"Front door",concept:"Vision doc"},{icon:"🗓️",name:"Calendar",concept:"6–18 mo horizon"},{icon:"📋",name:"Whiteboard",concept:"RFC"},{icon:"🧭",name:"Compass",concept:"Tech radar"},{icon:"📦",name:"Filing cabinet",concept:"ADRs"},{icon:"🔭",name:"Telescope",concept:"Arch review"}],aha:{title:"The anchor bias works in your favor.",text:"Research shows groups converge toward the first concrete idea they see — even if imperfect. Publishing a rough draft sets the anchor. Waiting until it's 'ready' means someone else does."},companies:["Netflix: engineering blog as vision signal","AWS: working backwards PR/FAQ","Stripe: long-form tech strategy memos","Shopify: RFC culture for platform decisions"],flashcards:[{q:"What is the 6–18 month planning horizon?",a:"Far enough to matter, near enough to act on. Shorter = tactics. Longer = fantasy."},{q:"What makes an RFC effective?",a:"Problem, proposal, alternatives, trade-offs, decision record — and a hard feedback deadline."},{q:"What is a tech radar?",a:"Adopt / Trial / Assess / Hold — shared vocabulary for your org's technical bets."}],feynmanPrompt:'Explain the difference between a technical vision and a roadmap to someone who has never written code.'},{id:"m2",color:"#1D9E75",bg:"#E1F5EE",dark:"#085041",cardBg:"#E1F5EE",num:"02",title:"Influence & Alignment",emoji:"🕸️",metaphor:"A chess player who knows every piece's incentives — not just their own.",hook:"Why does the quietest person in the room sometimes win every decision?",hookSub:"Because influence isn't volume — it's preparation. Staff engineers who master alignment land decisions without fighting for them. This module teaches you to work the room before entering it.",story:[{who:"🎭 Diplomat Dana",text:"Dana needed sign-off from three VPs on a migration plan. She had 15-min 1:1s with each VP the week before — asking about their concerns, adjusting the plan. The group meeting lasted 8 minutes. Two VPs called it the smoothest decision of the quarter."},{who:"🏦 Relationship Raj",text:"Raj spent 6 months helping other teams with small asks before his platform migration. When he needed cross-team resources, nobody said no. 'He's already helped us twice this quarter.' Relationship deposits compound like interest."}],model:"Influence without authority = stakeholder mapping + relationship capital + written alignment + the pre-brief.",tactics:[{icon:"3️⃣",name:"The 3-meeting rule",desc:"1:1 pre-briefs → written alignment summary → group ratification. Never land decisions cold."},{icon:"🏦",name:"Deposit before withdraw",desc:"Help stakeholders with their priorities before you need anything. Relationship debt is real debt."},{icon:"🎯",name:"Name the tension",desc:"When teams conflict, name it explicitly. The person who names the problem shapes the solution."},{icon:"👁️",name:"Strategic visibility",desc:"Proactive weekly updates build reputation without self-promotion. Work nobody sees doesn't count."}],recall:{q:"What is the single most common mistake engineers make when trying to land a major decision?",a:"Presenting it cold in a group meeting. Surprises in group settings create defensiveness. The real work happens in 1:1 pre-briefs. The group meeting should feel like ratification, not discovery."},palace:[{icon:"🗺️",name:"Map room",concept:"Power mapping"},{icon:"🤝",name:"Handshake",concept:"Relationship bank"},{icon:"📨",name:"Outbox",concept:"Pre-brief"},{icon:"⚖️",name:"Balance",concept:"Naming tension"},{icon:"📣",name:"Megaphone",concept:"Visibility"},{icon:"🔀",name:"Junction",concept:"Disagree & commit"}],aha:{title:"'Disagree and commit' is more powerful than silent compliance.",text:"When you say 'I disagree, and I'm fully committed to making this work' — on record — you preserve credibility, demonstrate maturity, AND create an honest trail if the decision needs revisiting."},companies:["Amazon: disagree & commit as explicit value","Apple: pre-briefing before review meetings","Google: doc-based decision culture","Meta: executive-aligned landing strategy"],flashcards:[{q:"What does the 3-meeting rule mean?",a:"1:1 pre-briefs → written alignment summary → group meeting as ratification only."},{q:"What is 'deposit before withdraw'?",a:"Help stakeholders with their priorities before asking anything of them. Build trust in advance, not during a crisis."},{q:"How do you handle a decision that went against you?",a:"Say explicitly: 'I disagree, and I'm fully committed to making this work.' Don't silently comply — it costs credibility either way."}],feynmanPrompt:'Explain why a staff engineer needs to understand org dynamics as well as distributed systems.'},{id:"m3",color:"#BA7517",bg:"#FAEEDA",dark:"#633806",cardBg:"#FAEEDA",num:"03",title:"Communication",emoji:"📡",metaphor:"A translator who speaks fluent VP and fluent engineer — and never confuses the two audiences.",hook:"Your VP has 90 seconds of attention. What do you say first?",hookSub:"The Pyramid Principle: answer first, then support. Most engineers explain the context, constraints, options — and then the conclusion. By then, the VP has checked their phone. This module fixes that.",story:[{who:"📢 Briefing Betty",text:"Betty opened a 5-minute VP slot with: 'We need to delay launch 2 weeks to prevent a data issue affecting 30% of users.' Her VP said 'approved' in 4 minutes. The engineer before her took 12 minutes and got asked to 'send a follow-up doc.'"},{who:"📝 Doc Dave",text:"Dave rewrote his design doc after a junior engineer had 8 questions. He put every answer in the doc itself. v2 had 1 question. v3 had none. The system shipped with zero kickoff meetings."}],model:"Lead with the conclusion. Support with structure. Save the evidence for those who ask.",tactics:[{icon:"⛰️",name:"Lead with the so-what",desc:"Open every briefing with the conclusion first. Never make the listener wait for the point."},{icon:"✍️",name:"Written > verbal for alignment",desc:"After every important discussion, send a written summary. Verbal alignment evaporates in 48 hours."},{icon:"🎖️",name:"Give credit loudly",desc:"Name engineers in leadership updates. Lifting others builds more trust than self-promotion."},{icon:"🎓",name:"Coach, don't tell",desc:"In mentorship: ask questions only. The answer they find sticks far longer than the one you give."}],recall:{q:"What is the Pyramid Principle, and why do engineers naturally violate it?",a:"Answer first, then structure and evidence. Engineers naturally explain the reasoning that led to their conclusion — because that's how they think. But listeners want the conclusion first, then supporting detail if they care."},palace:[{icon:"🏔️",name:"Pyramid",concept:"Answer first"},{icon:"🎯",name:"Target",concept:"Exec brief"},{icon:"📐",name:"Blueprint",concept:"Design doc"},{icon:"🗣️",name:"Microphone",concept:"SBI feedback"},{icon:"🌱",name:"Plant",concept:"Coaching 1:1"},{icon:"🏅",name:"Medal",concept:"Public credit"}],aha:{title:"Written summaries are political protection.",text:"When you send a written summary after an important conversation, you protect all parties. People who 'remember' decisions differently later have no argument against a contemporaneous written record."},companies:["McKinsey: Pyramid Principle as core framework","Amazon: 6-pager instead of slides","Google: design doc culture","Stripe: long-form written culture"],flashcards:[{q:"What is the Pyramid Principle?",a:"Lead with the conclusion (answer), then structure, then evidence. Not the reverse."},{q:"What's the test for a good design doc?",a:"A new hire can implement it with fewer than 2 clarifying questions."},{q:"Why is the coaching 1:1 rule 'questions only'?",a:"The answer the learner finds themselves sticks far longer than one given to them."}],feynmanPrompt:'Explain to a 10-year-old why it matters how you start a sentence when talking to someone very busy.'},{id:"m4",color:"#D85A30",bg:"#FAECE7",dark:"#712B13",cardBg:"#FAECE7",num:"04",title:"Cross-Team Execution",emoji:"⚙️",metaphor:"A project manager who never loses sight of the dependency map — because they drew it themselves.",hook:"Why do projects slip at the exact moment everyone thought they were on track?",hookSub:"Because the blockers were always there — just invisible. This module teaches you to see around corners: map dependencies before kickoff, pre-mortem failure before it happens, escalate with a recommendation before anyone asks.",story:[{who:"🔍 Detective Dev",text:"Dev did a dependency audit on a project that slipped 3 months. He found 11 dependencies — 7 weren't visible at kickoff. 'The signal was there,' he wrote. 'We just weren't looking.' He now starts every project: 'What will block us that we haven't named yet?'"},{who:"⚠️ Escalator Emma",text:"Emma sent her manager: 'At our pace we'll miss Q3. Option A: cut scope. Option B: add capacity. I recommend A.' Her manager called it 'the most useful message I got all week.' A similar PM surfaced the same problem with no options. Very different conversation."}],model:"Every project delay was predictable. The question is whether you built the system to see it coming.",tactics:[{icon:"📡",name:"Set update cadence first",desc:"Establish the status rhythm before anyone asks for it. Absence of cadence fills with rumor."},{icon:"📰",name:"Press release first",desc:"Before scoping, write the announcement for launch day. Fuzzy goals can't produce clear prose."},{icon:"🚨",name:"Escalate with a recommendation",desc:"'Problem + 2 options + my recommendation' keeps you in the driver's seat."},{icon:"🔬",name:"Pre-mortem everything",desc:"Assume failure before it happens. Top 3 risks get owners, mitigations, and escalation triggers."}],recall:{q:"What does a good escalation message look like?",a:"'We have a problem. Here are two options with trade-offs. I recommend option A because [reason]. What do you need from me to approve this?' Never just: 'We have a problem.'"},palace:[{icon:"🕸️",name:"Dep web",concept:"Dependency map"},{icon:"💀",name:"Skull",concept:"Pre-mortem"},{icon:"📊",name:"Status board",concept:"Update cadence"},{icon:"🗞️",name:"Newspaper",concept:"Press release first"},{icon:"🚀",name:"Launch pad",concept:"Kickoff checklist"},{icon:"📞",name:"Hotline",concept:"Early escalation"}],aha:{title:"The pre-mortem is the most underused technique in engineering.",text:"Teams that imagine the project has already failed — before starting — surface 30% more risks than those who do standard risk reviews. The 'it failed' framing removes optimism bias."},companies:["Amazon: working backwards + PR/FAQ","Google: OKR + weekly status","Netflix: chaos engineering as pre-mortem","Etsy: blameless post-mortems"],flashcards:[{q:"What is the pre-mortem technique?",a:"Assume the project already failed. Ask: 'What happened?' List causes. Score by likelihood × impact. Top 3 get mitigation plans."},{q:"When should you escalate?",a:"Before it's urgent — with a recommendation. Early + options + recommendation = trust. Late + problem only = fire drill."},{q:"What is 'press release first'?",a:"Before scoping, write the announcement for launch day. If you can't write it, the goals aren't clear yet."}],feynmanPrompt:'Explain to a new engineer why writing down what could go wrong before a project starts actually helps the project succeed.'},{id:"m5",color:"#3B6D11",bg:"#EAF3DE",dark:"#27500A",cardBg:"#EAF3DE",num:"05",title:"Leadership Tactics",emoji:"🧭",metaphor:"A conductor who knows every instrument's range — and when to let silence do the work.",hook:"What separates the staff engineer everyone wants in the room from the one who gives great answers but nobody thinks to invite?",hookSub:"Presence — not personality, but process. Meetings they run produce decisions. Feedback they give changes behavior. Their team feels protected. These are learnable mechanics, not innate traits.",story:[{who:"🎯 DRI Dmitri",text:"Dmitri started putting one name at the top of every meeting invite: 'Decision owner: [name].' His standups went from 22 minutes to 11 minutes in 3 weeks. 'When you know who decides, you know what your job is.'"},{who:"💌 Update Uma",text:"Uma sent her manager 3 bullets every Friday: top progress, top risk, one ask. After 6 weeks her manager stopped asking 'how's the project going?' in 1:1s. They started talking about the future instead. 'She's the most reliable person on my team.'"}],model:"Leadership without authority = clear decision owners + reliable information flow + behavioral feedback + protected maker time.",tactics:[{icon:"👑",name:"Every meeting needs a DRI",desc:"One person makes the call if consensus fails. Name them in the invite. It changes everything."},{icon:"📬",name:"Top 3 weekly update",desc:"Progress + risk + one ask. Every Friday. Your manager stops worrying; you start leading."},{icon:"🎯",name:"SBI, not sandwich",desc:"Situation + Behavior + Impact. The 'good-bad-good' structure dilutes the message."},{icon:"🛡️",name:"Protect maker time",desc:"Every interrupted hour costs 23 min of recovery. Advocate for meeting-free blocks for the whole team."},{icon:"🔥",name:"Spot burnout early",desc:"Cynicism in language. Shorter reviews. Missed optional meetings. Ask before it's a resignation."},{icon:"↩️",name:"Decline with counter-offer",desc:"'No, but here's what I can do' is leadership. A flat no is just a boundary."}],recall:{q:"What is the SBI feedback model, and why is the 'sandwich' a trap?",a:"Situation + Behavior + Impact. The feedback sandwich (good-bad-good) dilutes the critical message — recipients remember the praise and discount the middle. SBI is precise and ends with a question: 'What was your perspective on how that went?'"},palace:[{icon:"👑",name:"Throne",concept:"DRI"},{icon:"📮",name:"Mailbox",concept:"Weekly update"},{icon:"🎯",name:"Bullseye",concept:"SBI feedback"},{icon:"⏰",name:"Clock",concept:"Maker time"},{icon:"🌡️",name:"Thermometer",concept:"Burnout signal"},{icon:"↩️",name:"Boomerang",concept:"Counter-offer"}],aha:{title:"Interruptions cost more than you think — by 23 minutes.",text:"A UC Irvine study found it takes 23 min 15 sec to fully return to a task after an interruption. One notification mid-flow doesn't cost 10 seconds — it costs the rest of that focused session."},companies:["Amazon: DRI culture","Apple: single-threaded ownership","Netflix: keeper test","GitLab: async-first meeting culture"],flashcards:[{q:"What is DRI and why does naming one matter?",a:"Directly Responsible Individual. Without one, meetings drift. Naming a DRI changes how people prepare and how decisions land."},{q:"What is the 3-bullet Friday update?",a:"Top progress. Top risk. One thing you need from your manager. Keeps them informed without a meeting."},{q:"What are early burnout signals in high performers?",a:"Cynicism in language. Declining PR quality. Shorter code review responses. Missed optional meetings. Act at the first signal."}],feynmanPrompt:'Explain to a new engineer why naming one decision-maker before a meeting makes the meeting shorter and the decision stickier.'},{id:"m6",color:"#378ADD",bg:"#E6F1FB",dark:"#0C447C",cardBg:"#E6F1FB",num:"06",title:"Identity & Growth",emoji:"🌱",metaphor:"A sculptor who knows exactly which part of the marble still needs work — because they wrote it down last week.",hook:"Why do some staff engineers plateau at senior while others compound into principal — with the same technical skills?",hookSub:"Because identity is a skill. Knowing your archetype, telling your career story with specificity, sponsoring others with your credibility — these are learnable moves that separate a long career from a great one.",story:[{who:"🌟 Archetype Anika",text:"Anika spent 3 years being 'the best engineer in the room.' Then she wrote her readme. Section 3: 'What I'm working on as a leader: shaping technical direction at org level.' Her manager read it. Two weeks later she was invited to the platform strategy meeting. The readme was her application."},{who:"🎖️ Sponsor Sol",text:"Sol never told his mentees what to do. Instead, he said their names when headcount was being planned. 'Maya would be great for that platform role.' Maya got the role. She didn't know Sol had spoken up until 6 months later. 'That's sponsorship,' Sol said. 'Mentorship is in the room with you. Sponsorship is in the rooms you're not in.'"}],model:"Sponsoring = using your earned trust to open doors for others. Mentoring = giving advice. Only one of them scales.",tactics:[{icon:"🎯",name:"Be known for one thing first",desc:"Pick one domain and go deep. Reputation is built by repetition. It expands naturally from a specific base."},{icon:"🚪",name:"Sponsor publicly, mentor privately",desc:"Say names in the rooms they're not in. Attribute ideas. Recommend them for stretch roles."},{icon:"📝",name:"'Don't promote me yet' list",desc:"Honest inventory of gaps to close. Engineers who know what they're missing develop faster."},{icon:"⏱️",name:"Time allocation audit",desc:"Most staff engineers spend 60%+ on IC work. Track one week honestly. The gap is the insight."}],recall:{q:"What is the difference between sponsoring and mentoring?",a:"Mentoring happens in 1:1s — advice, coaching, support. Sponsoring happens in the rooms your mentee isn't in — saying their name, attributing ideas, recommending them for opportunities. Sponsorship uses your credibility on someone else's behalf."},palace:[{icon:"🪞",name:"Mirror",concept:"Self-archetype"},{icon:"📖",name:"Readme",concept:"Operating manual"},{icon:"🎤",name:"Stage",concept:"Career narrative"},{icon:"🚪",name:"Door",concept:"Sponsorship"},{icon:"⏱️",name:"Timer",concept:"Time audit"},{icon:"📋",name:"List",concept:"Gap inventory"}],aha:{title:"The time audit is the most uncomfortable exercise here.",text:"Most staff engineers believe they spend ~40% on strategy and influence. The average actual number, tracked honestly for one week, is closer to 10–15%. The gap between perceived and actual leverage is where career growth lives."},companies:["Microsoft: growth mindset culture","Google: staff+ archetype frameworks","Stripe: internal readme culture","Netflix: explicit sponsorship norms"],flashcards:[{q:"What are the four staff engineer archetypes?",a:"Tech Lead, Architect, Solver, Right Hand. Each creates leverage differently. Knowing yours shapes how you invest your time."},{q:"What is a staff engineer readme?",a:"A personal operating manual: how you work, what you value, what you're developing as a leader, and what helps you do your best work."},{q:"What is the 'don't promote me yet' list?",a:"A private, honest inventory of specific gaps between where you are now and where the next level requires."}],feynmanPrompt:"Explain what it means to 'sponsor' someone at work to a person who has only heard the word in the context of sports jerseys."}];

let cur=0,done=new Set(),wkDone=new Set();

function buildWeeks(){
  const w=document.getElementById('weekDots');
  for(let i=1;i<=8;i++){
    const d=document.createElement('div');
    d.className='week-dot'+(i===1?' active':'');
    d.id='wd'+i;
    d.innerHTML=`<span>${i}</span><label>Wk ${i}</label>`;
    d.onclick=()=>activateWeek(i);
    w.appendChild(d);
  }
}

function activateWeek(n){
  document.querySelectorAll('.week-dot').forEach(d=>d.classList.remove('active'));
  wkDone.add(n);
  wkDone.forEach(x=>{const e=document.getElementById('wd'+x);if(e)e.classList.add('done');});
  const el=document.getElementById('wd'+n);
  if(el){el.classList.remove('done');el.classList.add('active');}
}

function buildNav(){
  const nav=document.getElementById('modNav');
  MODULES.forEach((m,i)=>{
    const p=document.createElement('button');
    p.className='mod-pill'+(i===0?' active':'');
    p.id='pill'+i;
    p.textContent=m.num+' · '+m.title;
    p.onclick=()=>showMod(i);
    nav.appendChild(p);
  });
}

function buildSections(){
  const wrap=document.getElementById('sections');
  MODULES.forEach((m,i)=>{
    const s=document.createElement('div');
    s.className='section'+(i===0?' visible':'');
    s.id='sec'+i;
    s.innerHTML=buildMod(m,i);
    wrap.appendChild(s);
  });
}

function buildMod(m,i){
  const stories=m.story.map(s=>`<div class="story-bubble"><div class="story-who">${s.who}</div><div class="story-text">${s.text}</div></div>`).join('');
  const tactics=m.tactics.map(t=>`<div class="tactic"><div class="tactic-icon">${t.icon}</div><div class="tactic-name">${t.name}</div><div class="tactic-desc">${t.desc}</div></div>`).join('');
  const tacticsCol=m.tactics.map(t=>`<div style="display:flex;gap:10px;align-items:flex-start"><div style="font-size:20px;flex-shrink:0">${t.icon}</div><div><div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px">${t.name}</div><div style="font-size:12px;color:var(--muted);line-height:1.55">${t.desc}</div></div></div>`).join('');
  const palace=m.palace.map(p=>`<div class="palace-room"><div class="room-icon">${p.icon}</div><div class="room-name">${p.name}</div><div class="room-concept">${p.concept}</div></div>`).join('');
  const companies=m.companies.map(c=>`<span class="company-chip"><i class="ti ti-building" aria-hidden="true" style="font-size:11px"></i> ${c}</span>`).join('');
  const cards=m.flashcards.map((fc,fi)=>`<div class="flashcard-wrap" id="fc${i}_${fi}" onclick="flip('fc${i}_${fi}')"><div class="flashcard-inner"><div class="flashcard-face flashcard-front"><div class="card-side">Question — tap to flip</div><div class="card-text">${fc.q}</div></div><div class="flashcard-face flashcard-back" style="background:${m.bg}"><div class="card-side" style="color:${m.dark};opacity:.6">Answer</div><div class="card-text" style="color:${m.dark}">${fc.a}</div></div></div></div>`).join('');
  const kmapNodes=[
    {label:"Vision",bg:"#EEEDFE",color:"#3C3489"},
    {label:"RFC",bg:"#EEEDFE",color:"#3C3489"},
    {label:"Stakeholder map",bg:"#E1F5EE",color:"#085041"},
    {label:"Pre-brief",bg:"#E1F5EE",color:"#085041"},
    {label:"Design doc",bg:"#FAEEDA",color:"#633806"},
    {label:"Dep map",bg:"#FAECE7",color:"#712B13"},
    {label:"DRI",bg:"#EAF3DE",color:"#27500A"},
    {label:"Time audit",bg:"#E6F1FB",color:"#0C447C"}
  ];
  const visible=kmapNodes.slice(0,Math.min(i+2,kmapNodes.length));
  const kmap=visible.map((n,j)=>(j>0?'<div class="kmap-arrow">→</div>':'')+`<div class="kmap-node" style="background:${n.bg};color:${n.color}">${n.label}</div>`).join('');
  return `
<div class="hook" style="color:${m.dark}">
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.55;margin-bottom:.5rem">Module ${m.num} · Hook</div>
  <div class="hook-q" style="color:${m.dark}">${m.hook}</div>
  <div class="hook-sub" style="color:${m.dark}">${m.hookSub}</div>
</div>

<div class="mod-grid">

<div class="mod-main">
  <div class="anchor">
    <div class="anchor-vis" style="background:${m.bg}">${m.emoji}</div>
    <div>
      <div class="anchor-label">Memory anchor</div>
      <div class="anchor-name">${m.title}</div>
      <div class="anchor-metaphor">${m.metaphor}</div>
    </div>
  </div>

  <div class="sec-hdr"><div class="sec-hdr-icon" style="background:${m.bg}"><i class="ti ti-messages" aria-hidden="true" style="color:${m.color};font-size:14px"></i></div><div class="sec-hdr-title">Stories</div></div>
  ${stories}

  <div class="model-card" style="background:${m.color};margin-top:1.75rem">
    <div class="model-label">Mental model — keep this in your head</div>
    <div class="model-text">${m.model}</div>
    <div class="model-emoji">${m.emoji}</div>
  </div>

  <div class="recall-card">
    <div class="recall-q">
      <div class="recall-q-label">Active recall challenge</div>
      <div class="recall-q-text">${m.recall.q}</div>
    </div>
    <div class="recall-a" id="ra${i}">
      <div class="recall-a-label">Answer</div>
      <div class="recall-a-text">${m.recall.a}</div>
    </div>
    <button class="recall-btn" onclick="reveal(${i},this)">I've thought about it — show answer</button>
  </div>

  <div class="feynman">
    <div class="feynman-label">Feynman test</div>
    <div class="feynman-prompt">${m.feynmanPrompt}</div>
    <textarea id="feyn${i}" placeholder="Write your explanation here..."></textarea>
    <button class="feynman-btn" onclick="checkFeynman(${i})">Get feedback ↗</button>
    <div class="feynman-feedback" id="ff${i}" style="background:${m.bg};color:${m.dark}"></div>
  </div>
</div>

<div class="mod-sidebar">
  <div class="kmap">
    <div class="kmap-label">Knowledge connection</div>
    <div class="kmap-inner">${kmap}</div>
  </div>

  <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem 1.4rem">
    <div class="sec-hdr" style="margin:0 0 1rem 0"><div class="sec-hdr-icon" style="background:${m.bg}"><i class="ti ti-bulb" aria-hidden="true" style="color:${m.color};font-size:14px"></i></div><div class="sec-hdr-title">Management tips</div></div>
    <div style="display:flex;flex-direction:column;gap:12px">${tacticsCol}</div>
  </div>

  <div class="aha" style="background:var(--amber-light)">
    <div class="aha-icon">⚡</div>
    <div>
      <div class="aha-title" style="color:var(--amber-dark)">${m.aha.title}</div>
      <div class="aha-body" style="color:var(--amber-dark)">${m.aha.text}</div>
    </div>
  </div>

  <div class="palace">
    <div class="palace-label">Memory palace</div>
    <div class="palace-grid">${palace}</div>
  </div>

  <div>
    <div class="sec-hdr" style="margin:0 0 .85rem 0"><div class="sec-hdr-icon" style="background:${m.bg}"><i class="ti ti-building-skyscraper" aria-hidden="true" style="color:${m.color};font-size:14px"></i></div><div class="sec-hdr-title">Real-world examples</div></div>
    <div class="companies">${companies}</div>
  </div>

  <div>
    <div class="sec-hdr" style="margin:0 0 .85rem 0"><div class="sec-hdr-icon" style="background:${m.bg}"><i class="ti ti-cards" aria-hidden="true" style="color:${m.color};font-size:14px"></i></div><div class="sec-hdr-title">Flashcards — tap to flip</div></div>
    ${cards}
  </div>
</div>

</div>

<div class="bottom-nav">
  <button class="nav-btn" onclick="prevMod()" ${i===0?'disabled':''}>← Previous</button>
  <button class="nav-btn done-btn" style="background:${m.bg};color:${m.dark}" onclick="markDone(${i})">✓ Mark complete</button>
  <button class="nav-btn primary" style="background:${m.color}" onclick="nextMod()" ${i===5?'disabled':''}>Next →</button>
</div>`;
}

function showMod(i){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.mod-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('sec'+i).classList.add('visible');
  document.getElementById('pill'+i).classList.add('active');
  cur=i;
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextMod(){if(cur<5)showMod(cur+1);}
function prevMod(){if(cur>0)showMod(cur-1);}

function markDone(i){
  done.add(i);
  const pct=Math.round(done.size/6*100);
  document.getElementById('mainProg').style.width=pct+'%';
  document.getElementById('progLabel').textContent=done.size+' of 6 modules completed';
  activateWeek(Math.min(i+1,8));
  if(i<5)setTimeout(()=>showMod(i+1),350);
}

function reveal(i,btn){
  document.getElementById('ra'+i).classList.add('shown');
  btn.style.display='none';
}

function flip(id){document.getElementById(id).classList.toggle('flipped');}

function checkFeynman(i){
  const txt=document.getElementById('feyn'+i).value.trim();
  const fb=document.getElementById('ff'+i);
  if(txt.length<20){fb.textContent='Try writing a bit more — the Feynman technique works best when you commit to a full explanation.';fb.classList.add('shown');return;}
  const tips=['Good start. Did you use an analogy? The best Feynman explanations avoid jargon and anchor to something the listener already knows.','Nice. Now try removing every technical word. If the concept still makes sense without the vocabulary, you truly understand it.','Solid explanation. Ask yourself: if a 10-year-old couldn\'t follow this, what would you change? That edit is your insight.','Well done. Consider adding a concrete example — the "what would this look like in real life?" step is where most explanations gain power.'];
  fb.textContent=tips[i%tips.length];
  fb.classList.add('shown');
}

buildWeeks();buildNav();buildSections();
</script>

</body>
</html>
